<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pagos Red</title>
<style>
  /* ===== ESTILOS (sin cambios, igual que antes) ===== */
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3347;
    --accent: #4f8ef7;
    --green: #22c55e;
    --green-bg: #14532d33;
    --red: #ef4444;
    --red-bg: #7f1d1d33;
    --yellow: #f59e0b;
    --yellow-bg: #78350f33;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 60% 30%, #1e2a4a 0%, #0f1117 70%);
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px;
    box-shadow: 0 24px 64px #00000060;
  }
  .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .login-logo svg { color: var(--accent); }
  .login-logo span { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
  .login-subtitle { color: var(--text2); font-size: 0.875rem; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-group input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px 14px; font-size: 0.95rem;
    outline: none; transition: border-color .2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 11px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .88; }
  .login-error {
    background: var(--red-bg); border: 1px solid var(--red);
    color: var(--red); border-radius: 8px; padding: 10px 14px;
    font-size: 0.85rem; margin-top: 14px; display: none;
  }

  /* APP */
  #app { display: none; }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 58px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.05rem; }
  .header-logo svg { color: var(--accent); }
  .year-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 5px 10px;
    font-size: 0.9rem; cursor: pointer; outline: none;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .btn-add {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 7px 14px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: opacity .2s;
  }
  .btn-add:hover { opacity: .88; }
  .btn-toggle-inactive {
    background: transparent; border: 1px solid var(--border); color: var(--text2);
    border-radius: 8px; padding: 7px 14px; font-size: 0.85rem; cursor: pointer;
    transition: border-color .2s;
  }
  .btn-toggle-inactive:hover { border-color: var(--text2); }
  .btn-toggle-inactive.active { border-color: var(--accent); color: var(--accent); }
  .btn-logout {
    background: transparent; border: 1px solid var(--border); color: var(--text2);
    border-radius: 8px; padding: 7px 14px; font-size: 0.85rem; cursor: pointer;
    transition: border-color .2s;
  }
  .btn-logout:hover { border-color: var(--text2); }

  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* SUMMARY */
  .summary-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .summary-card .label { font-size: 0.75rem; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .summary-card .value { font-size: 1.5rem; font-weight: 700; }
  .summary-card .value.green { color: var(--green); }
  .summary-card .value.red { color: var(--red); }
  .summary-card .value.blue { color: var(--accent); }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .tab-btn {
    background: transparent; border: none; color: var(--text2);
    padding: 7px 18px; border-radius: 7px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all .15s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 20px; max-width: 380px; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius); padding: 10px 14px 10px 38px;
    font-size: 0.9rem; outline: none; transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .autocomplete-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); z-index: 200; display: none; max-height: 220px; overflow-y: auto;
  }
  .autocomplete-item {
    padding: 10px 14px; cursor: pointer; font-size: 0.875rem;
    transition: background .1s; border-bottom: 1px solid var(--border);
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: var(--border); }

  /* CLIENTS GRID */
  #clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .client-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; transition: border-color .2s;
  }
  .client-card:hover { border-color: var(--accent); }
  .client-card-header {
    padding: 16px 18px 12px; display: flex; justify-content: space-between; align-items: flex-start;
    cursor: pointer;
  }
  .client-card-header:hover .client-name { color: var(--accent); }
  .client-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; transition: color .15s; }
  .client-meta { font-size: 0.75rem; color: var(--text2); line-height: 1.6; }
  .client-badge {
    font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: .4px;
  }
  .badge-active { background: var(--green-bg); color: var(--green); }
  .badge-inactive { background: var(--red-bg); color: var(--red); }
  .badge-debt {
    background: var(--red-bg); color: var(--red);
    font-size: 0.6rem; padding: 2px 8px; border-radius: 20px;
    margin-left: 6px; font-weight: 700;
  }
  .client-plan-row {
    padding: 0 18px 12px; display: flex; justify-content: space-between; align-items: center;
  }
  .plan-name { font-size: 0.8rem; color: var(--text2); }
  .plan-cuota { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .months-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; padding: 12px 18px; border-top: 1px solid var(--border); }
  .month-cell {
    aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
    transition: transform .1s, filter .1s; user-select: none;
  }
  .month-cell:hover { transform: scale(1.08); filter: brightness(1.15); }
  .month-cell.paid { background: var(--green-bg); color: var(--green); border: 1px solid #22c55e44; }
  .month-cell.pending { background: var(--red-bg); color: var(--red); border: 1px solid #ef444444; }
  .month-cell.partial { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #f59e0b44; }
  .month-cell.paused { background: #1e293b; color: var(--text3); border: 1px solid #334155; }
  .month-cell.before-start { background: transparent; color: var(--text3); border: 1px solid transparent; cursor: default; opacity: .35; }
  .month-cell.future { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); cursor: pointer; }
  .month-cell.future:hover { border-color: var(--accent); color: var(--accent); }
  .month-cell .month-label { line-height: 1; }
  .month-cell .month-amount { font-size: 0.55rem; margin-top: 2px; opacity: .8; }
  .client-card-footer {
    padding: 10px 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-totals { font-size: 0.78rem; color: var(--text2); }
  .footer-totals span { font-weight: 700; }
  .footer-totals .paid-total { color: var(--green); }
  .footer-totals .pending-total { color: var(--red); }
  .btn-edit-client {
    background: transparent; border: 1px solid var(--border); color: var(--text2);
    border-radius: 6px; padding: 5px 12px; font-size: 0.78rem; cursor: pointer;
    transition: border-color .2s;
  }
  .btn-edit-client:hover { border-color: var(--accent); color: var(--accent); }

  /* TABLE VIEW */
  #table-view { display: none; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead tr { background: var(--surface2); }
  th, td { padding: 10px 12px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--text2); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .4px; }
  td:first-child, th:first-child { text-align: left; }
  tbody tr:hover { background: var(--surface2); }
  .cell-paid { color: var(--green); font-weight: 600; }
  .cell-pending { color: var(--red); }
  .cell-partial { color: var(--yellow); font-weight: 600; }
  .cell-paused { color: var(--text3); }
  .cell-future { color: var(--text3); }
  tfoot td { font-weight: 700; color: var(--accent); background: var(--surface2); }

  /* MODALS */
  .modal-overlay {
    position: fixed; inset: 0; background: #00000088; z-index: 500;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; width: 100%; max-width: 440px;
    box-shadow: 0 32px 80px #00000070; animation: modal-in .18s ease;
  }
  @keyframes modal-in { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: none; } }
  .modal-header {
    padding: 20px 22px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-weight: 700; font-size: 1rem; }
  .modal-close {
    background: transparent; border: none; color: var(--text2);
    cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 4px;
    border-radius: 4px; transition: color .15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 22px; }
  .modal-footer { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .btn-secondary {
    background: transparent; border: 1px solid var(--border); color: var(--text2);
    border-radius: 8px; padding: 8px 18px; font-size: 0.875rem; cursor: pointer;
  }
  .btn-secondary:hover { border-color: var(--text2); }
  .btn-danger {
    background: var(--red-bg); border: 1px solid var(--red); color: var(--red);
    border-radius: 8px; padding: 8px 18px; font-size: 0.875rem; cursor: pointer;
    margin-right: auto;
  }
  .btn-sm {
    padding: 3px 10px; font-size: 0.7rem; border-radius: 6px;
    border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer;
    transition: border-color .2s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

  /* Pay modal */
  .pay-context {
    background: var(--surface2); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px;
  }
  .pay-context-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
  .pay-context-sub { font-size: 0.8rem; color: var(--text2); }
  .pay-context-sub span { color: var(--accent); font-weight: 600; }
  .monto-row { display: flex; align-items: center; gap: 10px; }
  .monto-row input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px 14px;
    font-size: 1.1rem; font-weight: 700; outline: none; transition: border-color .2s;
  }
  .monto-row input:focus { border-color: var(--accent); }
  .check-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .check-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .check-row label { font-size: 0.875rem; color: var(--text2); cursor: pointer; }

  /* Client modal */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .span2 { grid-column: span 2; }
  .mg { margin-bottom: 0; }
  .mg label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  .mg input, .mg select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: 0.875rem;
    outline: none; transition: border-color .2s;
  }
  .mg input:focus, .mg select:focus { border-color: var(--accent); }
  .mg select option { background: var(--surface2); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text); border-radius: 10px;
    padding: 12px 20px; font-size: 0.875rem; z-index: 900;
    transform: translateY(80px); opacity: 0; transition: all .25s; pointer-events: none;
  }
  #toast.show { transform: none; opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hide { display: none; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state svg { color: var(--text3); margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  /* DETALLE CLIENTE */
  .detalle-cliente-info {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px;
    background: var(--surface2); padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
  }
  .detalle-cliente-info .item { font-size: 0.8rem; color: var(--text2); }
  .detalle-cliente-info .item span { color: var(--text); font-weight: 600; }
  .detalle-meses-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin: 12px 0;
  }
  .detalle-meses-grid .month-cell { aspect-ratio: auto; padding: 6px 0; font-size: 0.65rem; }
  .detalle-deuda-antigua {
    margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px;
  }
  .detalle-deuda-antigua h4 { font-size: 0.8rem; color: var(--red); margin-bottom: 8px; }

  /* DETALLE MES */
  .detalle-mes-pagos {
    background: var(--surface2); border-radius: 8px; padding: 12px 16px; margin-bottom: 12px;
  }
  .detalle-mes-pagos .pago-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .detalle-mes-pagos .pago-item:last-child { border-bottom: none; }
  .detalle-mes-pagos .pago-item .codigo { color: var(--accent); font-weight: 600; }
  .detalle-mes-pagos .pago-item .monto { font-weight: 700; }
  .detalle-mes-pagos .pago-item .fecha { color: var(--text3); }
  .detalle-mes-pagos .pago-item .acciones { display: flex; gap: 4px; }
  .detalle-mes-totales {
    display: flex; justify-content: space-between; font-size: 0.9rem;
    background: var(--bg); border-radius: 8px; padding: 10px 14px; margin-top: 8px;
  }
  .detalle-mes-totales .restante { color: var(--yellow); }
  .badge-pausado {
    display: inline-block; background: #1e293b; color: var(--text3);
    padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600;
  }

  /* RECEIPT */
  #modal-receipt .modal { max-width: 360px; }
  .receipt-body { padding: 24px; font-family: 'Courier New', monospace; }
  .receipt-header { text-align: center; border-bottom: 2px dashed var(--border); padding-bottom: 16px; margin-bottom: 16px; }
  .receipt-brand { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; }
  .receipt-sub { font-size: 0.75rem; color: var(--text2); margin-top: 4px; }
  .receipt-row { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 8px; }
  .receipt-row .rlabel { color: var(--text2); }
  .receipt-row .rval { font-weight: 600; }
  .receipt-divider { border: none; border-top: 1px dashed var(--border); margin: 12px 0; }
  .receipt-total { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 700; margin-top: 8px; }
  .receipt-total .rval { color: var(--green); }
  .receipt-footer { text-align: center; font-size: 0.7rem; color: var(--text3); margin-top: 16px; border-top: 2px dashed var(--border); padding-top: 12px; }
  .receipt-folio { font-size: 0.65rem; color: var(--text3); text-align: center; margin-top: 6px; letter-spacing: 1px; }
  .btn-print {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 22px; font-size: 0.875rem; font-weight: 600; cursor: pointer;
  }
  @media print {
    body > *:not(#modal-receipt) { display: none !important; }
    #modal-receipt { position: static !important; background: white !important; }
    #modal-receipt .modal { border: none !important; box-shadow: none !important; max-width: 100% !important; background: white !important; color: black !important; }
    .modal-header, .modal-footer { display: none !important; }
    .receipt-body { color: black !important; }
    .receipt-body * { color: black !important; border-color: #aaa !important; }
  }

  @media (max-width: 600px) {
    main { padding: 16px; }
    #clients-grid { grid-template-columns: 1fr; }
    .summary-bar { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .span2 { grid-column: span 1; }
    header { padding: 0 16px; }
    .header-logo span { display: none; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="spinner"></div></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>Pagos Red</span>
    </div>
    <p class="login-subtitle">Acceso al panel de administración</p>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="admin@ejemplo.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btn-login">Iniciar sesión</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-logo">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span>Pagos Red</span>
      </div>
      <select class="year-select" id="year-select"></select>
    </div>
    <div class="header-right">
      <button class="btn-add" id="btn-add-client">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Cliente
      </button>
      <button class="btn-toggle-inactive" id="btn-toggle-inactive">Inactivos</button>
      <button class="btn-logout" id="btn-logout">Salir</button>
    </div>
  </header>

  <main>
    <div class="summary-bar" id="summary-bar">

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, addDoc, setDoc, deleteDoc, query, where }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── CONFIG ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCcEFQgNwtlPNYZzLcYdBgcj1xWOIB7SSs",
  authDomain: "pagos-red.firebaseapp.com",
  projectId: "pagos-red",
  storageBucket: "pagos-red.firebasestorage.app",
  messagingSenderId: "538429549039",
  appId: "1:538429549039:web:15ad9c0f5979b8e7fcee1a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── STATE ────────────────────────────────────────────────────────────────────
let clientes = [];
let pagos = []; // {id, clienteId, año, mes, monto, fechaRegistro, nota, codigoComprobante, paused}
let selectedYear = new Date().getFullYear();
let editingClienteId = null;
let payingContext = null; // {clienteId, año, mes}
let showInactive = false;

const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ── AUTH ─────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    await loadAll();
    showApp();
  } else {
    showLogin();
  }
});

document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    errEl.textContent = 'Credenciales incorrectas. Verifica tu correo y contraseña.';
    errEl.style.display = 'block';
  }
});
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});
document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  const [cSnap, pSnap] = await Promise.all([
    getDocs(collection(db, 'clientes')),
    getDocs(collection(db, 'pagos'))
  ]);
  clientes = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  pagos    = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  clientes.sort((a,b) => a.nombre.localeCompare(b.nombre));
}

// ── SHOW / HIDE ───────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('loading').classList.add('hide');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function showApp() {
  document.getElementById('loading').classList.add('hide');
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initYearSelect();
  initSearch();
  render();
}

// ── YEAR ──────────────────────────────────────────────────────────────────────
function initYearSelect() {
  const sel = document.getElementById('year-select');
  const currentYear = new Date().getFullYear();
  sel.innerHTML = '';
  for (let y = 2024; y <= currentYear + 1; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === selectedYear) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => {
    selectedYear = parseInt(sel.value);
    render();
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  renderSummary();
  const tab = document.getElementById('tab-cards').classList.contains('active') ? 'cards' : 'table';
  const list = showInactive ? clientes : clientes.filter(c => c.activo);
  if (tab === 'cards') renderCards(list);
  else renderTable();
}

function renderSummary() {
  const now = new Date();
  const activeCl = clientes.filter(c => c.activo);
  let cobrado = 0, pendiente = 0, mesCobrado = 0;
  const mesCurrent = now.getMonth() + 1;

  activeCl.forEach(c => {
    const startDate = c.fechaInicio ? new Date(c.fechaInicio) : new Date('2024-01-01');
    const startYear = startDate.getFullYear();
    const startMonth = startDate.getMonth() + 1;
    for (let m = 1; m <= 12; m++) {
      if (selectedYear < startYear || (selectedYear === startYear && m < startMonth)) continue;
      const isPast = (selectedYear < now.getFullYear()) ||
                     (selectedYear === now.getFullYear() && m <= mesCurrent);
      if (!isPast) continue;
      const total = getTotalPagosMes(c.id, selectedYear, m);
      const estado = getEstadoMes(c.id, selectedYear, m, c.cuota);
      if (estado === 'paid' || estado === 'partial') {
        cobrado += total;
        if (m === mesCurrent && selectedYear === now.getFullYear()) mesCobrado += total;
      } else if (estado === 'pending') {
        pendiente += c.cuota;
      }
    }
  });
  document.getElementById('sum-activos').textContent = activeCl.length;
  document.getElementById('sum-cobrado').textContent = 'Q ' + cobrado.toLocaleString();
  document.getElementById('sum-pendiente').textContent = 'Q ' + pendiente.toLocaleString();
  document.getElementById('sum-mes').textContent = 'Q ' + mesCobrado.toLocaleString();
}

function getPagosMes(clienteId, año, mes) {
  return pagos.filter(p => p.clienteId === clienteId && p.año === año && p.mes === mes);
}

function getTotalPagosMes(clienteId, año, mes) {
  return getPagosMes(clienteId, año, mes).reduce((sum, p) => sum + p.monto, 0);
}

function getEstadoMes(clienteId, año, mes, cuota) {
  const pagosDelMes = getPagosMes(clienteId, año, mes);
  const pausado = pagosDelMes.some(p => p.paused === true || (p.monto === 0 && p.nota && p.nota.toLowerCase().includes('pausado')));
  if (pausado) return 'paused';
  const total = pagosDelMes.reduce((sum, p) => sum + p.monto, 0);
  if (total === 0) return 'pending';
  if (total >= cuota) return 'paid';
  return 'partial';
}

// ── DEUDA ANTERIOR ──────────────────────────────────────────────────────────
function calcularDeudaAnterior(clienteId, añoActual) {
  const cliente = clientes.find(c => c.id === clienteId);
  if (!cliente) return {};
  const startDate = cliente.fechaInicio ? new Date(cliente.fechaInicio) : new Date('2024-01-01');
  const startYear = startDate.getFullYear();
  const startMonth = startDate.getMonth() + 1;
  const deuda = {};
  for (let año = startYear; año < añoActual; año++) {
    for (let mes = 1; mes <= 12; mes++) {
      if (año === startYear && mes < startMonth) continue;
      const estado = getEstadoMes(clienteId, año, mes, cliente.cuota);
      if (estado === 'pending' || estado === 'partial') {
        if (!deuda[año]) deuda[año] = [];
        const totalPagado = getTotalPagosMes(clienteId, año, mes);
        const restante = cliente.cuota - totalPagado;
        deuda[año].push({ mes, monto: restante > 0 ? restante : cliente.cuota });
      }
    }
  }
  return deuda;
}

// ── RENDER MESES GRID ──────────────────────────────────────────────────────
function renderMesesGrid(clienteId, año, clickable = true) {
  const c = clientes.find(x => x.id === clienteId);
  if (!c) return '';
  const startDate = c.fechaInicio ? new Date(c.fechaInicio) : new Date('2024-01-01');
  const startYear = startDate.getFullYear();
  const startMonth = startDate.getMonth() + 1;

  let html = `<div class="detalle-meses-grid">`;
  for (let m = 1; m <= 12; m++) {
    const beforeStart = año < startYear || (año === startYear && m < startMonth);
    const estado = getEstadoMes(clienteId, año, m, c.cuota);
    let cls = 'future', label = '';
    if (beforeStart) cls = 'before-start';
    else {
      switch(estado) {
        case 'paid': cls = 'paid'; label = 'Q' + getTotalPagosMes(clienteId, año, m); break;
        case 'partial': cls = 'partial'; label = 'Q' + getTotalPagosMes(clienteId, año, m); break;
        case 'paused': cls = 'paused'; label = '⏸'; break;
        case 'pending': {
          const now = new Date();
          const isPast = (año < now.getFullYear()) || (año === now.getFullYear() && m <= now.getMonth()+1);
          cls = isPast ? 'pending' : 'future';
          label = isPast ? `Q${c.cuota}` : '+';
          break;
        }
        default: cls = 'future'; label = '+';
      }
    }
    const onclick = clickable ? `onclick="closeModal('modal-detalle'); abrirDetalleMes('${c.id}',${año},${m})"` : '';
    html += `<div class="month-cell ${cls}" style="cursor:${clickable ? 'pointer' : 'default'}" ${onclick}>
      <span class="month-label">${MONTHS[m-1]}</span>
      ${label ? `<span class="month-amount">${label}</span>` : ''}
    </div>`;
  }
  html += `</div>`;
  return html;
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────────
function renderCards(list) {
  const grid = document.getElementById('clients-grid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <p>No se encontraron clientes</p></div>`;
    return;
  }
  const now = new Date();
  list.forEach(c => {
    const startDate = c.fechaInicio ? new Date(c.fechaInicio) : new Date('2024-01-01');
    const startYear = startDate.getFullYear();
    const startMonth = startDate.getMonth() + 1;
    let paidTotal = 0, pendingTotal = 0;

    const monthCells = MONTHS.map((m, i) => {
      const mes = i + 1;
      const beforeStart = selectedYear < startYear || (selectedYear === startYear && mes < startMonth);
      if (beforeStart) return `<div class="month-cell before-start"><span class="month-label">${m}</span></div>`;

      const estado = getEstadoMes(c.id, selectedYear, mes, c.cuota);
      let cls, label2 = '';
      const total = getTotalPagosMes(c.id, selectedYear, mes);
      if (estado === 'paid') { cls = 'paid'; label2 = 'Q' + total; paidTotal += total; }
      else if (estado === 'partial') { cls = 'partial'; label2 = 'Q' + total; paidTotal += total; }
      else if (estado === 'paused') { cls = 'paused'; label2 = '⏸'; }
      else if (estado === 'pending') {
        const isPast = (selectedYear < now.getFullYear()) || (selectedYear === now.getFullYear() && mes <= now.getMonth()+1);
        cls = isPast ? 'pending' : 'future';
        if (isPast) { label2 = 'Q' + c.cuota; pendingTotal += c.cuota; }
        else label2 = '+';
      }
      return `<div class="month-cell ${cls}" onclick="abrirDetalleMes('${c.id}',${selectedYear},${mes})">
        <span class="month-label">${m}</span>
        ${label2 ? `<span class="month-amount">${label2}</span>` : ''}
      </div>`;
    }).join('');

    const deuda = calcularDeudaAnterior(c.id, selectedYear);
    const debtBadge = Object.keys(deuda).length > 0
      ? `<span class="badge-debt">⚠ Debe ${Object.keys(deuda).join(', ')}</span>`
      : '';

    const div = document.createElement('div');
    div.className = 'client-card';
    div.innerHTML = `
      <div class="client-card-header" onclick="openDetalleModal('${c.id}')">
        <div>
          <div class="client-name">${c.nombre}</div>
          <div class="client-meta">WAN: ${c.wan}<br>LAN: ${c.lan}</div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
          <span class="client-badge ${c.activo ? 'badge-active' : 'badge-inactive'}">${c.activo ? 'Activo' : 'Inactivo'}</span>
          ${debtBadge}
        </div>
      </div>
      <div class="client-plan-row">
        <span class="plan-name">📡 ${c.plan || 'Sin plan'}</span>
        <span class="plan-cuota">Q${c.cuota}/mes</span>
      </div>
      <div class="months-grid">${monthCells}</div>
      <div class="client-card-footer">
        <div class="footer-totals">
          Cobrado: <span class="paid-total">Q${paidTotal}</span> &nbsp;|&nbsp;
          Pendiente: <span class="pending-total">Q${Math.max(0,pendingTotal)}</span>
        </div>
        <button class="btn-edit-client" onclick="event.stopPropagation(); openClientModal('${c.id}')">Editar</button>
      </div>`;
    grid.appendChild(div);
  });
}

// ── DETALLE CLIENTE MODAL ──────────────────────────────────────────────────
window.openDetalleModal = (clienteId) => {
  const c = clientes.find(x => x.id === clienteId);
  if (!c) return;
  const añoActual = selectedYear;

  let infoHTML = `
    <div class="detalle-cliente-info">
      <div class="item">Nombre: <span>${c.nombre}</span></div>
      <div class="item">Plan: <span>${c.plan || '—'}</span></div>
      <div class="item">Cuota: <span>Q${c.cuota}</span></div>
      <div class="item">Estado: <span>${c.activo ? 'Activo' : 'Inactivo'}</span></div>
      <div class="item">WAN: <span>${c.wan || '—'}</span></div>
      <div class="item">LAN: <span>${c.lan || '—'}</span></div>
      <div class="item">Inicio: <span>${c.fechaInicio || '—'}</span></div>
      <div class="item">Nota: <span>${c.nota || '—'}</span></div>
    </div>
  `;

  let mesesHTML = `<div style="font-weight:600;font-size:0.85rem;margin:8px 0 4px;">${añoActual}</div>`;
  mesesHTML += renderMesesGrid(clienteId, añoActual, true);

  const deuda = calcularDeudaAnterior(clienteId, añoActual);
  let deudaHTML = '';
  if (Object.keys(deuda).length > 0) {
    deudaHTML = `<div class="detalle-deuda-antigua">
      <h4>🔴 Deuda de años anteriores</h4>`;
    const años = Object.keys(deuda).sort((a,b) => b - a);
    for (const año of años) {
      deudaHTML += `<div style="margin-top:10px;"><span style="font-weight:600;color:var(--text2);">${año}</span>`;
      deudaHTML += renderMesesGrid(clienteId, parseInt(año), true);
      deudaHTML += `</div>`;
    }
    deudaHTML += `</div>`;
  }

  document.getElementById('detalle-title').textContent = `Detalle: ${c.nombre}`;
  document.getElementById('detalle-body').innerHTML = infoHTML + mesesHTML + deudaHTML;
  openModal('modal-detalle');
};

// ── DETALLE DE PAGOS DEL MES ──────────────────────────────────────────────
window.abrirDetalleMes = (clienteId, año, mes) => {
  const c = clientes.find(x => x.id === clienteId);
  if (!c) return;
  const pagosDelMes = getPagosMes(clienteId, año, mes);
  const totalPagado = getTotalPagosMes(clienteId, año, mes);
  const estado = getEstadoMes(clienteId, año, mes, c.cuota);
  const restante = Math.max(0, c.cuota - totalPagado);
  const estaPagado = estado === 'paid';
  const estaPausado = estado === 'paused';

  let bodyHTML = `
    <div class="pay-context">
      <div class="pay-context-name">${c.nombre}</div>
      <div class="pay-context-sub">${MONTHS_FULL[mes-1]} ${año} · Cuota: <span>Q${c.cuota}</span></div>
      ${estaPausado ? `<div style="margin-top:6px;"><span class="badge-pausado">⏸ Servicio pausado</span></div>` : ''}
    </div>
  `;

  if (pagosDelMes.length > 0) {
    bodyHTML += `<div class="detalle-mes-pagos">`;
    pagosDelMes.sort((a,b) => new Date(a.fechaRegistro) - new Date(b.fechaRegistro));
    pagosDelMes.forEach(p => {
      const fecha = new Date(p.fechaRegistro).toLocaleDateString('es-GT');
      const esPausado = p.paused === true || (p.monto === 0 && p.nota && p.nota.toLowerCase().includes('pausado'));
      bodyHTML += `
        <div class="pago-item">
          <span class="codigo">${p.codigoComprobante || '—'}</span>
          <span class="fecha">${fecha}</span>
          <span class="monto" style="color:${esPausado ? 'var(--text3)' : 'var(--green)'}">${esPausado ? '⏸ Q0' : 'Q'+p.monto}</span>
          ${p.nota ? `<span style="color:var(--text3);font-size:0.7rem;">${p.nota}</span>` : ''}
          <span class="acciones">
            <button class="btn-sm" onclick="reimprimirComprobante('${p.id}')">🖨</button>
            <button class="btn-sm danger" onclick="eliminarPago('${p.id}')">✕</button>
          </span>
        </div>
      `;
    });
    bodyHTML += `</div>`;
  } else {
    bodyHTML += `<p style="color:var(--text3);font-size:0.85rem;">No hay pagos registrados para este mes.</p>`;
  }

  bodyHTML += `
    <div class="detalle-mes-totales">
      <span>Total pagado: <strong style="color:var(--green);">Q${totalPagado}</strong></span>
      ${!estaPagado && !estaPausado ? `<span class="restante">Restante: Q${restante}</span>` : ''}
      ${estaPagado ? `<span style="color:var(--green);">✅ Completado</span>` : ''}
    </div>
  `;

  document.getElementById('mes-pagos-title').textContent = `Pagos · ${c.nombre}`;
  document.getElementById('mes-pagos-body').innerHTML = bodyHTML;
  document.getElementById('btn-agregar-pago-mes').style.display = (estaPagado || estaPausado) ? 'none' : 'block';
  document.getElementById('btn-agregar-pago-mes').onclick = () => {
    closeModal('modal-mes-pagos');
    abrirFormularioPago(clienteId, año, mes, restante);
  };
  openModal('modal-mes-pagos');
};

// ── ABRIR FORMULARIO DE PAGO ──────────────────────────────────────────────
function abrirFormularioPago(clienteId, año, mes, montoSugerido = null) {
  const c = clientes.find(x => x.id === clienteId);
  if (!c) return;
  payingContext = { clienteId, año, mes };

  const totalPagado = getTotalPagosMes(clienteId, año, mes);
  const restante = Math.max(0, c.cuota - totalPagado);

  document.getElementById('modal-pago-title').textContent = `Registrar pago · ${c.nombre}`;
  document.getElementById('pay-context').innerHTML = `
    <div class="pay-context-name">${c.nombre}</div>
    <div class="pay-context-sub">${MONTHS_FULL[mes-1]} ${año} · Cuota: <span>Q${c.cuota}</span></div>
  `;
  document.getElementById('pay-monto').value = montoSugerido !== null ? montoSugerido : c.cuota;
  document.getElementById('pay-monto').disabled = false;
  document.getElementById('pay-parcial').checked = false;
  document.getElementById('pay-paused').checked = false;
  document.getElementById('pay-nota').value = '';
  document.getElementById('pay-mensaje').textContent = `Saldo restante: Q${restante}`;
  openModal('modal-pago');
}

// ── TOGGLES ──────────────────────────────────────────────────────────────────
window.toggleParcial = () => {
  if (document.getElementById('pay-parcial').checked) {
    document.getElementById('pay-paused').checked = false;
    document.getElementById('pay-monto').disabled = false;
  }
};
window.togglePaused = () => {
  const paused = document.getElementById('pay-paused').checked;
  document.getElementById('pay-monto').disabled = paused;
  if (paused) {
    document.getElementById('pay-monto').value = 0;
    document.getElementById('pay-parcial').checked = false;
  }
};

// ── GUARDAR PAGO ────────────────────────────────────────────────────────────
window.guardarPago = async () => {
  const isPaused = document.getElementById('pay-paused').checked;
  let monto = parseFloat(document.getElementById('pay-monto').value);
  if (isPaused) monto = 0;
  let nota = document.getElementById('pay-nota').value.trim();
  if (isPaused && !nota) nota = 'Servicio pausado';
  const { clienteId, año, mes } = payingContext;
  const c = clientes.find(x => x.id === clienteId);
  if (!c) { toast('Cliente no encontrado', 'error'); return; }

  const pagosExistentes = getPagosMes(clienteId, año, mes);
  const totalPagadoAnterior = pagosExistentes.reduce((sum, p) => sum + p.monto, 0);
  const restante = c.cuota - totalPagadoAnterior;

  if (!isPaused && (isNaN(monto) || monto < 0)) { toast('Ingresa un monto válido', 'error'); return; }
  if (!isPaused && monto > restante) {
    toast(`El monto no puede exceder el saldo restante de Q${restante}`, 'error');
    return;
  }
  if (!isPaused && monto > c.cuota) { toast('El monto no puede exceder la cuota mensual', 'error'); return; }

  const esParcial = document.getElementById('pay-parcial').checked;
  if (esParcial && monto >= c.cuota) {
    toast('Para pago parcial el monto debe ser menor a la cuota', 'error');
    return;
  }

  const codigo = 'REC-' + año + String(mes).padStart(2,'0') + '-' + Math.random().toString(36).substr(2,4).toUpperCase();

  const data = {
    clienteId,
    año,
    mes,
    monto,
    fechaRegistro: new Date().toISOString(),
    nota,
    codigoComprobante: codigo,
    paused: isPaused
  };

  try {
    const ref = await addDoc(collection(db, 'pagos'), data);
    pagos.push({ id: ref.id, ...data });
    closeModal('modal-pago');
    render();

    // Recalcular total pagado y saldo después de guardar
    const pagosActualizados = getPagosMes(clienteId, año, mes);
    const nuevoTotal = pagosActualizados.reduce((sum, p) => sum + p.monto, 0);
    const nuevoSaldo = Math.max(0, c.cuota - nuevoTotal);

    toast('Pago registrado ✓', 'success');
    if (!isPaused) {
      // Mostrar comprobante con el total acumulado y saldo real
      showReceipt(c, año, mes, monto, nota, codigo, nuevoTotal, nuevoSaldo);
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
};

// ── ELIMINAR PAGO ──────────────────────────────────────────────────────────
window.eliminarPago = async (pagoId) => {
  if (!confirm('¿Eliminar este pago? Esta acción no se puede deshacer.')) return;
  try {
    await deleteDoc(doc(db, 'pagos', pagoId));
    pagos = pagos.filter(p => p.id !== pagoId);
    closeModal('modal-mes-pagos');
    render();
    toast('Pago eliminado', 'success');
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
};

// ── REIMPRIMIR COMPROBANTE ────────────────────────────────────────────────
window.reimprimirComprobante = (pagoId) => {
  const pago = pagos.find(p => p.id === pagoId);
  if (!pago) { toast('Pago no encontrado', 'error'); return; }
  const cliente = clientes.find(c => c.id === pago.clienteId);
  if (!cliente) { toast('Cliente no encontrado', 'error'); return; }

  // Calcular total pagado del mes y saldo restante
  const pagosMes = getPagosMes(cliente.id, pago.año, pago.mes);
  const totalPagado = pagosMes.reduce((sum, p) => sum + p.monto, 0);
  const saldo = Math.max(0, cliente.cuota - totalPagado);

  showReceipt(cliente, pago.año, pago.mes, pago.monto, pago.nota, pago.codigoComprobante, totalPagado, saldo);
};

// ── COMPROBANTE (con total acumulado y saldo real) ──────────────────────
function showReceipt(cliente, año, mes, montoActual, nota, codigo, totalPagado, saldoRestante) {
  const now = new Date();
  const fecha = now.toLocaleDateString('es-GT', {day:'2-digit',month:'long',year:'numeric'});
  const esParcial = totalPagado < cliente.cuota && totalPagado > 0;
  const pagosMes = getPagosMes(cliente.id, año, mes);
  const hayPagosPrevios = pagosMes.length > 1;

  let previosText = '';
  if (hayPagosPrevios) {
    const montosPrevios = pagosMes.filter(p => p.id !== codigo); // no tenemos id aquí, mejor filtramos por monto? difícil, pero mostramos un mensaje genérico
    // Para simplificar, mostramos "Pagos previos" si hay más de un pago
    previosText = `<div class="receipt-row"><span class="rlabel">Pagos previos</span><span class="rval">Q${(totalPagado - montoActual).toFixed(2)}</span></div>`;
  }

  document.getElementById('receipt-content').innerHTML = `
    <div class="receipt-header">
      <div class="receipt-brand">📡 SERVICIOS DE RED</div>
      <div class="receipt-sub">Comprobante de pago de servicio</div>
    </div>
    <div class="receipt-row"><span class="rlabel">Cliente</span><span class="rval">${cliente.nombre}</span></div>
    <div class="receipt-row"><span class="rlabel">Período</span><span class="rval">${MONTHS_FULL[mes-1]} ${año}</span></div>
    <div class="receipt-row"><span class="rlabel">Fecha de pago</span><span class="rval">${fecha}</span></div>
    <div class="receipt-row"><span class="rlabel">Plan</span><span class="rval">${cliente.plan || 'Servicio mensual'}</span></div>
    <div class="receipt-row"><span class="rlabel">Cuota mensual</span><span class="rval">Q${cliente.cuota}</span></div>
    ${previosText}
    <div class="receipt-row"><span class="rlabel">Este pago</span><span class="rval">Q${montoActual.toFixed(2)}</span></div>
    <hr class="receipt-divider">
    <div class="receipt-total"><span>Total acumulado</span><span class="rval">Q${totalPagado.toFixed(2)}</span></div>
    ${esParcial ? `<div style="display:flex;justify-content:space-between;font-size:0.9rem;color:var(--yellow);margin-top:4px;">
      <span>Saldo pendiente</span><span>Q${saldoRestante.toFixed(2)}</span>
    </div>` : ''}
    ${!esParcial && totalPagado >= cliente.cuota ? `<div style="display:flex;justify-content:space-between;font-size:0.9rem;color:var(--green);margin-top:4px;">
      <span>✅ Mes completado</span><span>Saldo Q0</span>
    </div>` : ''}
    <div class="receipt-footer">
      Código: <strong>${codigo}</strong><br>
      Gracias por su pago.
    </div>
    <div class="receipt-folio">${codigo}</div>`;
  openModal('modal-receipt');
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function renderTable() {
  const now = new Date();
  const thead = document.querySelector('#annual-table thead');
  const tbody = document.querySelector('#annual-table tbody');
  const tfoot = document.querySelector('#annual-table tfoot');
  thead.innerHTML = `<tr><th>Cliente</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th>Total</th></tr>`;
  const monthTotals = Array(12).fill(0);
  let grandTotal = 0;
  const list = showInactive ? clientes : clientes.filter(c=>c.activo);
  tbody.innerHTML = list.map(c => {
    const startDate = c.fechaInicio ? new Date(c.fechaInicio) : new Date('2024-01-01');
    const startYear = startDate.getFullYear();
    const startMonth = startDate.getMonth() + 1;
    let rowTotal = 0;
    const cells = MONTHS.map((_,i) => {
      const mes = i+1;
      const beforeStart = selectedYear < startYear || (selectedYear === startYear && mes < startMonth);
      if (beforeStart) return `<td class="cell-future" style="opacity:.3">·</td>`;
      const estado = getEstadoMes(c.id, selectedYear, mes, c.cuota);
      const total = getTotalPagosMes(c.id, selectedYear, mes);
      let cls, label;
      switch(estado) {
        case 'paid': cls = 'cell-paid'; label = 'Q' + total; rowTotal += total; monthTotals[i] += total; grandTotal += total; break;
        case 'partial': cls = 'cell-partial'; label = 'Q' + total; rowTotal += total; monthTotals[i] += total; grandTotal += total; break;
        case 'paused': cls = 'cell-paused'; label = '⏸'; break;
        case 'pending': {
          const isPast = (selectedYear < now.getFullYear()) || (selectedYear === now.getFullYear() && mes <= now.getMonth()+1);
          cls = isPast ? 'cell-pending' : 'cell-future';
          label = isPast ? 'Q' + c.cuota : '+';
          break;
        }
        default: cls = 'cell-future'; label = '+';
      }
      return `<td class="${cls}" style="cursor:pointer" onclick="abrirDetalleMes('${c.id}',${selectedYear},${mes})">${label}</td>`;
    }).join('');
    const inactiveMark = !c.activo ? ' <span style="font-size:.7rem;color:var(--text3)">(inactivo)</span>' : '';
    return `<tr><td>${c.nombre}${inactiveMark}</td>${cells}<td style="font-weight:700;color:var(--accent)">Q${rowTotal}</td></tr>`;
  }).join('');
  tfoot.innerHTML = `<tr><td>TOTAL</td>${monthTotals.map(t=>`<td>Q${t}</td>`).join('')}<td>Q${grandTotal}</td></tr>`;
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function initSearch() {
  const input = document.getElementById('search-input');
  const drop  = document.getElementById('autocomplete');
  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    const base = showInactive ? clientes : clientes.filter(c => c.activo);
    if (!q) { drop.style.display = 'none'; renderCards(base); return; }
    const matches = base.filter(c => c.nombre.toLowerCase().includes(q));
    if (matches.length) {
      drop.innerHTML = matches.map(c =>
        `<div class="autocomplete-item" onclick="selectClient('${c.id}')">${c.nombre} <span style="color:var(--text3);font-size:.75rem">— Q${c.cuota}/mes</span></div>`
      ).join('');
      drop.style.display = 'block';
    } else {
      drop.innerHTML = '<div class="autocomplete-item" style="color:var(--text3)">Sin resultados</div>';
      drop.style.display = 'block';
    }
    renderCards(matches);
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#search-wrap')) drop.style.display = 'none';
  });
}

window.selectClient = (id) => {
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  document.getElementById('search-input').value = c.nombre;
  document.getElementById('autocomplete').style.display = 'none';
  renderCards([c]);
};

// ── TAB SWITCH ────────────────────────────────────────────────────────────────
window.switchTab = (tab) => {
  document.getElementById('tab-cards').classList.toggle('active', tab==='cards');
  document.getElementById('tab-table').classList.toggle('active', tab==='table');
  document.getElementById('clients-grid').style.display = tab==='cards' ? 'grid' : 'none';
  document.getElementById('table-view').style.display   = tab==='table' ? 'block' : 'none';
  document.getElementById('search-wrap').style.display  = tab==='cards' ? 'block' : 'none';
  if (tab === 'table') renderTable();
};

// ── MODAL CLIENTE ─────────────────────────────────────────────────────────────
window.openClientModal = (id = null) => {
  editingClienteId = id;
  const c = id ? clientes.find(x => x.id === id) : null;
  document.getElementById('modal-cliente-title').textContent = c ? 'Editar cliente' : 'Nuevo cliente';
  document.getElementById('cl-nombre').value    = c?.nombre    || '';
  document.getElementById('cl-wan').value       = c?.wan       || '';
  document.getElementById('cl-lan').value       = c?.lan       || '';
  document.getElementById('cl-plan').value      = c?.plan      || '';
  document.getElementById('cl-cuota').value     = c?.cuota     || '';
  document.getElementById('cl-fecha').value     = c?.fechaInicio || '';
  document.getElementById('cl-activo').value    = c ? String(c.activo) : 'true';
  document.getElementById('cl-nota').value      = c?.nota      || '';
  document.getElementById('btn-delete-client').style.display = c ? 'block' : 'none';
  openModal('modal-cliente');
};

window.guardarCliente = async () => {
  const data = {
    nombre:      document.getElementById('cl-nombre').value.trim(),
    wan:         document.getElementById('cl-wan').value.trim(),
    lan:         document.getElementById('cl-lan').value.trim(),
    plan:        document.getElementById('cl-plan').value.trim(),
    cuota:       parseFloat(document.getElementById('cl-cuota').value) || 0,
    fechaInicio: document.getElementById('cl-fecha').value,
    activo:      document.getElementById('cl-activo').value === 'true',
    nota:        document.getElementById('cl-nota').value.trim(),
  };
  if (!data.nombre) { toast('El nombre es obligatorio', 'error'); return; }

  try {
    if (editingClienteId) {
      await setDoc(doc(db, 'clientes', editingClienteId), data);
      const idx = clientes.findIndex(c => c.id === editingClienteId);
      clientes[idx] = { id: editingClienteId, ...data };
    } else {
      const ref = await addDoc(collection(db, 'clientes'), data);
      clientes.push({ id: ref.id, ...data });
    }
    clientes.sort((a,b) => a.nombre.localeCompare(b.nombre));
    closeModal('modal-cliente');
    render();
    toast('Cliente guardado ✓', 'success');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
};

window.deleteCliente = async () => {
  if (!confirm('¿Eliminar este cliente? Sus pagos se conservan.')) return;
  try {
    await deleteDoc(doc(db, 'clientes', editingClienteId));
    clientes = clientes.filter(c => c.id !== editingClienteId);
    closeModal('modal-cliente');
    render();
    toast('Cliente eliminado', 'success');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
};

document.getElementById('btn-add-client').addEventListener('click', () => openClientModal(null));

document.getElementById('btn-toggle-inactive').addEventListener('click', () => {
  showInactive = !showInactive;
  document.getElementById('btn-toggle-inactive').classList.toggle('active', showInactive);
  render();
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
window.closeModal = (id) => { document.getElementById(id).classList.remove('open'); };
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => el.className = '', 3000);
}

// ── IMPORT (ejecutar desde consola) ────────────────────────────────────────
window.importarDatos = async () => {
  console.log('Función de importación disponible. Usa window.importarDatos()');
};
</script>
